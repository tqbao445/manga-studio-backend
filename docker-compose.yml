services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: manga-studio-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD} -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-setup:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: manga-studio-db-setup
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P ${MSSQL_SA_PASSWORD} -C -Q "IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = N'manga_studio') CREATE DATABASE manga_studio"
        echo "Database 'manga_studio' is ready."
    depends_on:
      sqlserver:
        condition: service_healthy

  backend:
    build: .
    container_name: manga-studio-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=manga_studio;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ${MSSQL_SA_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db-setup:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  sqlserver_data:
