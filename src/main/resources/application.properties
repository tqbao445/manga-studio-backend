spring.application.name=CreateSeries_demo
server.port=8080
# ─── SQL Server ───
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=manga;encrypt=false;trustServerCertificate=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=12345
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# ─── JWT ───
app.jwt.secret=MangaFlowSecretKeyForJWTTokenGeneration2024AtLeast256BitsLong
app.jwt.expiration=86400000
# ─── Swagger / Springdoc ───
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
# In SQL, request, response chi tiết
logging.level.com.mangaflow.studio=DEBUG
logging.level.org.springframework.security=INFO
