server.port=8080

# ─── Load .env (nếu có) ───
spring.config.import=optional:file:.env[.properties]

# ─── SQL Server ───
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=manga_studio;encrypt=false;trustServerCertificate=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:sa}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ─── JWT ───
app.jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_abcdef1234567890}
app.jwt.expiration=86400000

# ─── File Upload ───
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ─── Cloudinary ───
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dklp7kcl9}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ─── Swagger / Springdoc ───
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ─── Logging ───
logging.level.com.mangaflow.studio=DEBUG
logging.level.org.springframework.security=INFO